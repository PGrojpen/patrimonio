services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: patrimonio-backend-dev
    volumes:
      - ./backend:/app
      - backend_cache:/app/cache
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./patrimonio.db
    networks:
      - patrimonio-dev

  frontend:
    image: node:20-slim
    container_name: patrimonio-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - patrimonio-dev

volumes:
  backend_cache:

networks:
  patrimonio-dev:
    driver: bridge
